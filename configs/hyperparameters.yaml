# ==========================================
# 🧠 PPO Agent Hyperparameters (Anti-Collapse Edition)
# ==========================================
ppo:
  # ลด Learning Rate ลงนิดหน่อย ป้องกันไม่ให้โมเดลรีบด่วนสรุปไปหา Action แย่ๆ ([-1, -1]) เร็วเกินไป
  learning_rate: 0.0001  
  
  n_steps: 4096
  batch_size: 512
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  
  # 💥 เพิ่ม Entropy 5 เท่า! (สำคัญมาก) 
  # บังคับให้บอท "กล้าลองผิดลองถูก" ไม่ยอมให้กราฟ Action แบนราบเป็นเส้นตรงอีกต่อไป
  ent_coef: 0.05 

  net_arch:
    pi: [256, 256]
    vf: [256, 256]

# ==========================================
# 📈 Market Environment Configs
# ==========================================
env:
  initial_balance: 30.0
  max_inventory: 0.0004
  order_size: 0.0001
  maker_fee: 0.0000
  
  # 💥 ขยายเพดาน Spread (ให้มีพื้นที่วิ่งหนีตาย) 
  # ถ้าตลาดยับ มันต้องถ่าง Spread ได้กว้างถึง 40 USD
  max_spread: 40.0 
  
  # ⚖️ 💥 Inventory Penalty (\eta) โหมดซาดิสม์!
  # ปรับเพิ่มจาก 6000 เป็น 50000 การถือของเต็มพอร์ต (0.0004) จะโดนหัก Reward ยับเยิน
  # บังคับให้มันต้องรีบตั้ง Skew เทขายทิ้งให้ได้!
  eta: 50000.0